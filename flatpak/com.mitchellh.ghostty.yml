app-id: com.mitchellh.ghostty
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
default-branch: tip
command: ghostty
finish-args:
  # 3D rendering
  - --device=dri
  # use host PTS namespace
  - --device=all
  # Windowing
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Allow user to specify additional config files in home by default
  - --filesystem=home:ro
  # So we can escape the sandbox
  - --talk-name=org.freedesktop.Flatpak
cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/pkgconfig
  - /share/vala
  - "*.la"
  - "*.a"
  - "*.so"

modules:
  - dependencies.yml

  - name: ghostty
    buildsystem: simple
    build-options:
      append-path: /app/zig
    build-commands:
      - zig build
        -Doptimize=ReleaseFast
        -Dcpu=baseline
        -Dflatpak=true
        -Dstrip=false
        -fno-sys=oniguruma
        --prefix /app
        --search-prefix /app
        --system $PWD/vendor/p
    sources:
      - type: dir
        path: ..
        skip:
          - flatpak/.flatpak-builder
          - flatpak/builddir
          - flatpak/repo
          - zig-cache
          - zig-out

      - zig-packages.json

  - name: ghostty-web
    buildsystem: simple
    build-options:
      append-path: /app/zig
    build-commands:
      # Build the WASM terminal emulator
      - zig build
        -Demit-lib-vt
        -Dtarget=wasm32-freestanding
        -Doptimize=ReleaseSmall
        -fno-sys=oniguruma
        --prefix /app
        --search-prefix /app
        --system $PWD/vendor/p
      # Install WASM binary alongside web files
      - mkdir -p /app/share/ghostty/web
      - cp zig-out/bin/ghostty-vt.wasm /app/share/ghostty/web/
      - cp -r web/client/* /app/share/ghostty/web/
      - cp web/server/main.ts /app/share/ghostty/web/server.ts
      # Create the server wrapper script
      - |
        cat > /app/bin/ghostty-serve << 'WRAPPER'
        #!/bin/sh
        exec deno run --allow-net --allow-read --allow-run --allow-env \
          /app/share/ghostty/web/server.ts \
          --port "${PORT:-9090}" \
          --shell "${SHELL:-/bin/bash}"
        WRAPPER
      - chmod +x /app/bin/ghostty-serve
    sources:
      - type: dir
        path: ..
        skip:
          - flatpak/.flatpak-builder
          - flatpak/builddir
          - flatpak/repo
          - zig-cache
          - zig-out

      - zig-packages.json
